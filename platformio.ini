[env:proton]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
build_src_flags = -O0 -DAPP_GAMES=0 -DDVI_DETECT_ACTIVE_LOW=1
debug_tool = picoprobe
upload_protocol = picoprobe
monitor_speed = 115200

[env:proton_games]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
build_src_flags = -O0 -DAPP_GAMES=1 -DDVI_DETECT_ACTIVE_LOW=1
debug_tool = picoprobe
upload_protocol = picoprobe
monitor_speed = 115200
